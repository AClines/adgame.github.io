<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADGame</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      background: rgba(15, 23, 42, .7);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(99, 102, 241, .15);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-light), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 2rem;
      font-size: .95rem;
      transition: color .2s;
    }
    nav a:hover { color: var(--text); }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1.25rem;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      max-width: 540px;
      color: var(--text-muted);
      font-size: 1.15rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: .85rem 2.2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: #fff;
      box-shadow: 0 4px 24px rgba(99, 102, 241, .35);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 32px rgba(99, 102, 241, .5);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(99, 102, 241, .1);
      border-radius: 14px;
      padding: 2rem;
      transition: transform .2s, border-color .3s;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--primary-light);
    }

    .card h3 {
      font-size: 1.2rem;
      margin-bottom: .6rem;
    }

    .card p {
      color: var(--text-muted);
      font-size: .95rem;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: .85rem;
      border-top: 1px solid rgba(99, 102, 241, .1);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">ADGame</div>
    <nav>
      <a href="#">首页</a>
      <a href="https://play.google.com/store/apps/details?id=com.acgame.sandpixel" target="_blank">游戏</a>
      <a href="#">关于</a>
    </nav>
  </header>

  <section class="hero">
    <h1>欢迎来到 <span>ADGame</span></h1>
    <p>探索精彩的游戏世界，发现无限乐趣。我们致力于打造高品质的游戏体验。</p>
    <a href="https://play.google.com/store/apps/details?id=com.acgame.sandpixel" target="_blank" class="btn btn-primary">开始探索</a>
  </section>

  <section class="cards">
    <div class="card">
      <h3>精品游戏</h3>
      <p>精心挑选的优质游戏合集，涵盖多种类型，总有一款适合你。</p>
    </div>
    <div class="card">
      <h3>社区互动</h3>
      <p>加入玩家社区，分享攻略心得，与志同道合的朋友一起畅玩。</p>
    </div>
    <div class="card">
      <h3>持续更新</h3>
      <p>定期上线新内容与新功能，保持新鲜感，带来更多惊喜。</p>
    </div>
  </section>

  <footer>
    &copy; 2026 ADGame. All rights reserved.
  </footer>

</body>
</html>
